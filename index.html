<!DOCTYPE html>
<html lang="ch-de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zofingen Wetter</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Zofingen Wetter</h1>
    <div class="now">
    <p>Aktuell:</p>
    <p id="tempnow"></p>
    <img id="weathericon" src="" alt="Wetter Icon">
    <p id="rainnow"></p>
    <p id="snownow"></p>
    <p id="windnow"></p>
    <p id="snowdepthnow"></p>
        </div>

    <div class="forecast">
    <h2>Vorhersage:</h2>

    <p>In einer Stunde:</p>
    <p id="temp1h"></p>
    <img id="weathericon1h" src="" alt="Wetter Icon">

    <p>In zwei Stunden:</p>
    <p id="temp2h"></p>
    <img id="weathericon2h" src="" alt="Wetter Icon">

    <p>In drei Stunden:</p>
    <p id="temp3h"></p>
    <img id="weathericon3h" src="" alt="Wetter Icon">

    <p>In vier Stunden:</p>
    <p id="temp4h"></p>
    <img id="weathericon4h" src="" alt="Wetter Icon">

    <p>In fünf Stunden:</p>
    <p id="temp5h"></p>
    <img id="weathericon5h" src="" alt="Wetter Icon">

    <p>In sechs Stunden:</p>
    <p id="temp6h"></p>
    <img id="weathericon6h" src="" alt="Wetter Icon">  

    <p>In sieben Stunden:</p>
    <p id="temp7h"></p>
    <img id="weathericon7h" src="" alt="Wetter Icon">
    </div>
    </html>
